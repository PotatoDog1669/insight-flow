name: Bug report
description: Report a reproducible defect in Insight Flow
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        Before submitting, please:
        - confirm you are on a recent version of the project
        - search existing issues to avoid duplicates
        - remove secrets, tokens, and private data from logs or screenshots
  - type: textarea
    id: summary
    attributes:
      label: Summary / 问题概述
      description: What is broken, and why does it matter?
      placeholder: A short description of the problem and its impact.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction Steps / 复现步骤
      description: Share the smallest reliable set of steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Run ...
        4. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior / 期望结果
      description: What should have happened instead?
      placeholder: Describe the correct result.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior / 实际结果
      description: What happened in practice?
      placeholder: Describe the observed result, error, or failure mode.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area / 影响范围
      description: Which area is affected?
      options:
        - Backend API
        - Frontend UI
        - Collectors
        - Reports / Rendering
        - Sinks / Integrations
        - Docs
        - Developer Experience
        - Other
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment / 环境信息
      description: Share versions, platform, and any relevant deployment details.
      placeholder: |
        OS:
        Python:
        Node.js:
        Browser:
        Deployment mode:
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or Screenshots / 日志或截图
      description: Paste relevant logs or attach screenshots. Please redact secrets.
      render: shell
  - type: checkboxes
    id: checks
    attributes:
      label: Checks / 提交前检查
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed secrets and sensitive data from the report.
          required: true
