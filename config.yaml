# LexDeepResearch 配置文件
# 优先级: 环境变量 (.env) > 此文件 > 代码默认值

app:
  name: LexDeepResearch
  debug: false
  log_level: INFO

database:
  url: postgresql+asyncpg://lex:password@localhost:5432/lexdeepresearch
  pool_size: 10

redis:
  url: redis://localhost:6379/0

llm:
  primary_model: gpt-4o-mini
  fallback_model: deepseek-chat
  max_tokens: 2048
  temperature: 0.3

agent:
  codex:
    auth_mode: api_key  # api_key | oauth
    base_url: https://api.openai.com/v1
    model: gpt-5-codex
    timeout_sec: 90

scheduler:
  daily_collect_time: "06:30"
  weekly_report_day: "sunday"
  weekly_report_time: "20:00"

collector:
  max_concurrency: 5
  deepbrowse_concurrency: 2
  timeout_seconds: 60
  retry_max_attempts: 3

browser:
  provider: local  # local | cloud
  local:
    headless: true
  cloud:
    cdp_endpoint: ws://cloud-browser:3000

processor:
  score_threshold: 0.4
  dedup_window_hours: 72

sink:
  default: notion
  notion:
    database_id: ""
    parent_page_id: ""
  obsidian:
    vault_path: ""

routing:
  default_profile: codex_mvp_v1
  profiles:
    stable_v1:
      stages:
        collect:
          primary: rss
          fallback: [blog_scraper, deepbrowse]
        filter:
          primary: llm_openai
          fallback: [rule]
        keywords:
          primary: llm_openai
          fallback: [rule]
        report:
          primary: llm_openai
          fallback: [agent_codex]
        publish:
          targets: [database, notion_api]
          on_failure:
            database: abort
            notion_api: continue
      providers:
        llm_openai:
          type: llm
          model: gpt-4o-mini
          timeout_sec: 120
          max_retry: 2
        agent_codex:
          type: agent
          mode: api
          timeout_sec: 90
          max_retry: 1
        deepbrowse:
          type: browser_agent
          timeout_sec: 60
          max_retry: 1
    codex_mvp_v1:
      stages:
        collect:
          primary: rss
          fallback: [blog_scraper, deepbrowse]
        filter:
          primary: agent_codex
          fallback: [rule]
        keywords:
          primary: agent_codex
          fallback: [rule]
        report:
          primary: agent_codex
          fallback: [llm_openai]
        publish:
          targets: [database, notion_api]
          on_failure:
            database: abort
            notion_api: continue
      providers:
        llm_openai:
          type: llm
          model: gpt-4o-mini
          timeout_sec: 120
          max_retry: 2
        agent_codex:
          type: agent
          mode: api
          auth_mode: api_key
          model: gpt-5-codex
          timeout_sec: 90
          max_retry: 1
        deepbrowse:
          type: browser_agent
          timeout_sec: 60
          max_retry: 1
