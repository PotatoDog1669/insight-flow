<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-labelledby="title desc">
  <title id="title">Insight Flow Brand Icon</title>
  <desc id="desc">A pixel-style IF monogram on a rounded dark background with blue-to-cyan blocks.</desc>
  <defs>
    <linearGradient id="bg" x1="32" y1="24" x2="224" y2="232" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#11161D" />
      <stop offset="1" stop-color="#06090D" />
    </linearGradient>
    <linearGradient id="stroke" x1="36" y1="36" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#374151" />
      <stop offset="1" stop-color="#1F2937" />
    </linearGradient>
    <linearGradient id="cyan" x1="72" y1="56" x2="116" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8BFFFF" />
      <stop offset="1" stop-color="#34D9FF" />
    </linearGradient>
    <linearGradient id="blue" x1="120" y1="60" x2="188" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#62A7FF" />
      <stop offset="1" stop-color="#2563EB" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="12" y="12" width="232" height="232" rx="40" fill="url(#bg)" stroke="url(#stroke)" stroke-width="4" />
  <rect x="24" y="24" width="208" height="208" rx="28" fill="none" stroke="#0F172A" stroke-opacity="0.55" />

  <g opacity="0.08" fill="#D7E8FF">
    <rect x="176" y="42" width="14" height="14" />
    <rect x="194" y="42" width="14" height="14" />
    <rect x="176" y="60" width="14" height="14" />
    <rect x="52" y="184" width="12" height="12" />
    <rect x="68" y="184" width="12" height="12" />
    <rect x="196" y="190" width="10" height="10" />
  </g>

  <g filter="url(#glow)">
    <g fill="url(#cyan)">
      <rect x="66" y="58" width="26" height="26" />
      <rect x="66" y="90" width="26" height="26" />
      <rect x="66" y="122" width="26" height="26" />
      <rect x="66" y="154" width="26" height="26" />

      <rect x="98" y="58" width="26" height="26" />
      <rect x="98" y="154" width="26" height="26" />
    </g>

    <g fill="url(#blue)">
      <rect x="130" y="58" width="26" height="26" />
      <rect x="162" y="58" width="26" height="26" />

      <rect x="130" y="90" width="26" height="26" />
      <rect x="130" y="122" width="26" height="26" />
      <rect x="130" y="154" width="26" height="26" />

      <rect x="162" y="122" width="26" height="26" />
    </g>
  </g>

  <g opacity="0.22">
    <rect x="62" y="54" width="130" height="130" fill="none" stroke="#93C5FD" stroke-width="2" stroke-dasharray="2 10" />
  </g>
</svg>
