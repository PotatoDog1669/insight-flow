<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Glow Filter for the Blue Pixels -->
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- App Icon Background -->
  <rect width="512" height="512" rx="114" fill="#0A0A0A" />
  
  <!-- Solid White 'I' -->
  <rect x="121" y="142" width="64" height="229" rx="8" fill="#FFFFFF" />
  
  <!-- Pixelated Blue 'F' -->
  <g fill="#3B68FF" filter="url(#glow)">
    <!-- Stem -->
    <rect x="224" y="142" width="46" height="46" rx="8" />
    <rect x="224" y="203" width="46" height="46" rx="8" />
    <rect x="224" y="264" width="46" height="46" rx="8" />
    <rect x="224" y="325" width="46" height="46" rx="8" />
    
    <!-- Top Arm -->
    <rect x="285" y="142" width="46" height="46" rx="8" />
    <rect x="346" y="142" width="46" height="46" rx="8" />
    
    <!-- Mid Arm -->
    <rect x="285" y="203" width="46" height="46" rx="8" />
  </g>
</svg>
