site_key: deepseek
profile_version: v1
start_urls:
  - https://www.deepseek.com/news
list_page:
  item_selector: a[href*='mp.weixin.qq.com/s/']
  url_attr: href
detail_page:
  content_selector: "#js_content, .rich_media_content, .rich_media_wrp, article, main"
  remove_selectors:
  - script
  - style
  title_selector: "#activity-name, h1"
normalization:
  min_content_chars: 300
